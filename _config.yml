# Site settings
title: "DSAS 2026"
subtitle: "DSAS 2026"
description: "Dependable and Secure Autonomous Systems — Space and Drone/UAV Technologies in the Age of AI"
url: "https://dsas2026.github.io"
baseurl: ""

# Site author (can be used for organizers)
author:
  name: "DSAS 2026 Organizing Committee"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 5
paginate_path: "/page:num/"

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: false

# Exclude files from build
exclude:
  - README.md
  - LICENSE
  - node_modules
  - vendor

